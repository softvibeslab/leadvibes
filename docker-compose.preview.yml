# Docker Compose para Deploy Preview
# Usa puertos diferentes para no conflictuar con producción

services:
  # MongoDB Database (Preview)
  mongodb-preview:
    image: mongo:7
    container_name: rovi-mongodb-preview
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME:-rovi_crm_preview}
    volumes:
      - mongodb_preview_data:/data/db
      - ./mongodb-init:/docker-entrypoint-initdb.d
    ports:
      - "27018:27017"
    networks:
      - rovi-preview-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Preview)
  backend-preview:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rovi-backend-preview
    restart: always
    environment:
      # Database
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb-preview:27017/${DB_NAME:-rovi_crm_preview}?authSource=admin
      DB_NAME: ${DB_NAME:-rovi_crm_preview}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}

      # AI
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}

      # CORS - Acepta ambos puertos
      CORS_ORIGINS: ${CORS_ORIGINS_PREVIEW:-http://localhost:3001,http://31.220.63.211:3001}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-preview}
      DEBUG: ${DEBUG:-true}
    volumes:
      - ./backend:/app
      - backend_preview_uploads:/app/uploads
    ports:
      - "8001:8000"
    depends_on:
      mongodb-preview:
        condition: service_healthy
    networks:
      - rovi-preview-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Preview)
  frontend-preview:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://31.220.63.211:8001
    container_name: rovi-frontend-preview
    restart: always
    ports:
      - "3001:80"
    depends_on:
      backend-preview:
        condition: service_healthy
    networks:
      - rovi-preview-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  mongodb_preview_data:
    driver: local
  backend_preview_uploads:
    driver: local

networks:
  rovi-preview-network:
    driver: bridge
