name: Deploy to Preview

on:
  push:
    branches:
      - rovi_deploy
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: preview

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        working-directory: ./backend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8000
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed with status: $?"

  build:
    name: Build Preview Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=preview-
          flavor: |
            latest=false

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=preview-
          flavor: |
            latest=false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Preview
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Preview Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PREVIEW_HOST }}
          username: ${{ secrets.PREVIEW_USER }}
          key: ${{ secrets.PREVIEW_SSH_KEY }}
          port: ${{ secrets.PREVIEW_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            # Navigate to project directory
            cd ${{ secrets.PREVIEW_PATH }}

            # Create .env file for preview
            cat > .env << 'EOF'
            MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}
            MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}_preview
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ALGORITHM=HS256
            JWT_EXPIRATION_HOURS=24
            EMERGENT_LLM_KEY=${{ secrets.EMERGENT_LLM_KEY }}
            CORS_ORIGINS=${{ secrets.PREVIEW_CORS_ORIGINS }}
            ENVIRONMENT=preview
            DEBUG=true
            EOF

            # Pull latest images
            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.preview.yml pull

            # Restart services
            echo "Restarting services..."
            docker compose -f docker-compose.preview.yml up -d --force-recreate

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -af --filter "until=6h"

            echo "✅ Preview deployment completed successfully!"

      - name: Health check
        run: |
          echo "Waiting for services to be ready..."
          sleep 15

          # Check backend health
          BACKEND_URL="${{ secrets.PREVIEW_BACKEND_URL }}/api/health"
          if curl -f -s "$BACKEND_URL" | grep -q "healthy"; then
            echo "✅ Preview backend is healthy"
          else
            echo "⚠️ Preview backend health check failed (non-blocking)"
          fi

      - name: Create deployment comment
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => comment.user.type === 'Bot' && comment.body.includes('Preview deployment'));
            const body = `## 🚀 Preview Deployment
            **Environment**: Preview
            **Branch**: \`${context.ref}\`
            **Commit**: ${context.sha}
            **Author**: ${context.actor}
            **Status**: ✅ Deployed successfully
            **Backend URL**: ${{ secrets.PREVIEW_BACKEND_URL }}
            **Frontend URL**: ${{ secrets.PREVIEW_FRONTEND_URL }}
            *Deployed at: ${new Date().toISOString()}*`;

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Preview deployment successful!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo ""
          echo "🔗 Preview URLs:"
          echo "  Backend: ${{ secrets.PREVIEW_BACKEND_URL }}"
          echo "  Frontend: ${{ secrets.PREVIEW_FRONTEND_URL }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Preview deployment failed!"
          echo "Please check the logs for details."

  cleanup:
    name: Cleanup Old Preview Deployments
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Cleanup old images on preview server
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.PREVIEW_HOST }}
          username: ${{ secrets.PREVIEW_USER }}
          key: ${{ secrets.PREVIEW_SSH_KEY }}
          port: ${{ secrets.PREVIEW_PORT || 22 }}
          script: |
            cd ${{ secrets.PREVIEW_PATH }}
            docker image prune -af --filter "until=24h"
            echo "✅ Cleanup completed"
