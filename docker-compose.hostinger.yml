# Docker Compose simplificado para Panel Docker de Hostinger
# Esta versión está optimizada para el panel de control de Hostinger

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: rovi-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME:-rovi_crm}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - rovi-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rovi-backend
    restart: always
    environment:
      # Database
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DB_NAME:-rovi_crm}?authSource=admin
      DB_NAME: ${DB_NAME:-rovi_crm}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}

      # AI
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - rovi-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rovi-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rovi-network

volumes:
  mongodb_data:
    driver: local

networks:
  rovi-network:
    driver: bridge
