version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: leadvibes-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-leadvibes}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - leadvibes-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadvibes-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: leadvibes
      JWT_SECRET: 1e1ba0ce89fb6bfd0d2fa9c025a6d333e8533703f7927611f79fa6fe5a3c4787
      JWT_EXPIRATION_HOURS: 24
      EMERGENT_LLM_KEY: 6422740a283342afa95d4ded10fbb5ea.njMvimW35vveFkyT
      CORS_ORIGINS: http://31.97.145.53
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - leadvibes-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadvibes-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - leadvibes-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  leadvibes-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
